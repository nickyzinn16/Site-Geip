<html>
    <head>
        <meta charset="utf-8">
        <title>Candidatura - GEIPE</title>
        <link rel="icon" type="image/png" href="./resources/images/logo-geipe.png">
        <link rel="stylesheet" href="./styles/base.css">
        <link rel="stylesheet" href="./styles/banner.css">
        <link rel="stylesheet" href="./styles/candidatura.css">
        <link rel="stylesheet" href="./styles/footer.css">
        <script src="https://kit.fontawesome.com/35842701b4.js" crossorigin="anonymous"></script>
    </head>
    <body>
        <div>
            <main class="formu">
                <div class="form">

                    <h2>Formulário ao Candidato</h2>
                    <form class="box">
                        <div class="form-lab">
                            <label for="nome">Nome Completo</label>
                            <input type="text" id="nome" name="nome">
                        </div>

                        <div class="form-lab">
                            <label for="area">Area Escolar</label>
                            <select type="text" id="area" name="area">
                                <option value="">Selecione uma area</option>
                                <option value="asibd">ASIBD</option>
                                <option value="artes graficas">Artes Graficas</option>
                                <option value="contabilidade">Contabilidade</option>
                                <option value="eletricidade">Eletrotecnia</option>
                                <option value="inforgestao">Informatica de Gestao</option>
                                <option value="mecanica">Mecanotencia</option>
                            </select>
                        </div>

                        <div class="form-lab">
                            <label for="email">Email</label>
                            <input type="email" id="email" name="email">
                        </div>

                        <button type="submit">Enviar</button>
                </form>
                </div>
            </main>
        </div>

        
        <script src="./scripts/politicas.js"></script>
        <script src="./scripts/botao.js"></script>
    </body>
</html>
